<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Brick do Edu</title>
    <meta
      name="description"
      content="Brick do Edu — móveis e itens usados à venda. Veja fotos e fale no WhatsApp."
    />
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <header>
      <h1>Brick do Edu</h1>
      <p>Móveis e itens à venda — veja fotos ou fale comigo no WhatsApp</p>
    </header>

    <main>
      <div class="toolbar">
        <button type="button" class="btn-filter" id="toggle-sold" aria-pressed="false">
          Ocultar vendidos
        </button>
        <label class="sort-label" for="sort-price">
          Ordenar
          <select id="sort-price">
            <option value="default">Padrão</option>
            <option value="asc">Menor preço</option>
            <option value="desc">Maior preço</option>
          </select>
        </label>
      </div>
      <div class="grid" id="gallery"></div>
    </main>

    <footer>Brick do Edu — valores de referência, confirme no WhatsApp</footer>

    <script src="/items.js"></script>
    <script>
      const gallery = document.getElementById("gallery");
      const toggleSoldBtn = document.getElementById("toggle-sold");
      const sortSelect = document.getElementById("sort-price");

      let hideSold = false;
      let sortMode = "default";

      function createCard(item) {
        const sold = Boolean(item.sold);
        const hasDrive =
          !sold && item.driveUrl && item.driveUrl !== "COLOQUE_O_LINK_AQUI";
        const images = item.covers || [item.cover];
        const imagesHtml = images
          .map(
            (src) =>
              `<img src="${src}" alt="${item.name}" loading="lazy" />`
          )
          .join("");

        const card = document.createElement("article");
        card.className = sold ? "card card--sold" : "card";

        let bodyHtml;
        if (sold) {
          bodyHtml = `
            <div class="card-body">
              <h2>${item.name}</h2>
              <p class="sold-label">Vendido</p>
            </div>
          `;
        } else {
          bodyHtml = `
            <div class="card-body">
              <h2>${item.name}</h2>
              ${item.details ? `<p class="details">${item.details}</p>` : ""}
              <p class="price${item.price == null ? " price--pending" : ""}">${formatPrice(item.price)}</p>
              <div class="actions">
                ${
                  hasDrive
                    ? `<a class="btn btn-drive" href="${item.driveUrl}" target="_blank" rel="noopener">Ver todas as fotos</a>`
                    : ""
                }
                <a
                  class="btn btn-whatsapp"
                  href="${whatsappUrl(item.name)}"
                  target="_blank"
                  rel="noopener"
                >
                  Tenho interesse — WhatsApp
                </a>
              </div>
            </div>
          `;
        }

        card.innerHTML = `
          <div class="card-images${images.length > 1 ? " card-images--duo" : ""}">
            ${imagesHtml}
            ${sold ? '<span class="sold-badge">Vendido</span>' : ""}
          </div>
          ${bodyHtml}
        `;
        return card;
      }

      function getVisibleItems() {
        let list = ITEMS.slice();

        if (hideSold) {
          list = list.filter((item) => !item.sold);
        }

        if (sortMode === "asc" || sortMode === "desc") {
          list.sort((a, b) => {
            if (a.sold && !b.sold) return 1;
            if (!a.sold && b.sold) return -1;
            const priceA = a.price == null ? Number.POSITIVE_INFINITY : a.price;
            const priceB = b.price == null ? Number.POSITIVE_INFINITY : b.price;
            return sortMode === "asc" ? priceA - priceB : priceB - priceA;
          });
        }

        return list;
      }

      function renderGallery() {
        gallery.innerHTML = "";
        getVisibleItems().forEach((item) => {
          gallery.appendChild(createCard(item));
        });
      }

      toggleSoldBtn.addEventListener("click", () => {
        hideSold = !hideSold;
        toggleSoldBtn.setAttribute("aria-pressed", String(hideSold));
        toggleSoldBtn.textContent = hideSold
          ? "Mostrar vendidos"
          : "Ocultar vendidos";
        renderGallery();
      });

      sortSelect.addEventListener("change", () => {
        sortMode = sortSelect.value;
        renderGallery();
      });

      renderGallery();
    </script>
  </body>
</html>
