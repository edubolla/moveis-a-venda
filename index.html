<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Brick do Edu</title>
    <meta
      name="description"
      content="Brick do Edu — móveis e itens usados à venda. Veja fotos e fale no WhatsApp."
    />
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <header>
      <h1>Brick do Edu</h1>
      <p>Móveis e itens à venda — veja fotos ou fale comigo no WhatsApp</p>
    </header>

    <main>
      <div class="grid" id="gallery"></div>
    </main>

    <footer>Brick do Edu — valores de referência, confirme no WhatsApp</footer>

    <script src="/items.js"></script>
    <script>
      const gallery = document.getElementById("gallery");

      ITEMS.forEach((item) => {
        const hasDrive =
          item.driveUrl && item.driveUrl !== "COLOQUE_O_LINK_AQUI";
        const images = item.covers || [item.cover];
        const imagesHtml = images
          .map(
            (src) =>
              `<img src="${src}" alt="${item.name}" loading="lazy" />`
          )
          .join("");

        const card = document.createElement("article");
        card.className = "card";
        card.innerHTML = `
          <div class="card-images${images.length > 1 ? " card-images--duo" : ""}">${imagesHtml}</div>
          <div class="card-body">
            <h2>${item.name}</h2>
            ${item.details ? `<p class="details">${item.details}</p>` : ""}
            <p class="price${item.price == null ? " price--pending" : ""}">${formatPrice(item.price)}</p>
            <div class="actions">
              <a
                class="btn btn-drive ${hasDrive ? "" : "disabled"}"
                href="${hasDrive ? item.driveUrl : "#"}"
                ${hasDrive ? 'target="_blank" rel="noopener"' : ""}
              >
                ${hasDrive ? "Ver todas as fotos" : "Fotos em breve"}
              </a>
              <a
                class="btn btn-whatsapp"
                href="${whatsappUrl(item.name)}"
                target="_blank"
                rel="noopener"
              >
                Tenho interesse — WhatsApp
              </a>
            </div>
          </div>
        `;
        gallery.appendChild(card);
      });
    </script>
  </body>
</html>
